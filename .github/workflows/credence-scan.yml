# Sample workflow: run Credence's local supply-chain scan against a repo's working
# tree on every PR and on push to main, uploading findings as a build artifact.
#
# NOTE: `supply-chain` emits console/json/cyclonedx/aibom — NOT SARIF. For SARIF →
# GitHub Code Scanning, use the web `scan` command against URL targets (it has a
# SARIF reporter), or wait for supply-chain SARIF support. This sample uploads the
# JSON findings as an artifact instead.

name: Credence Supply Chain Scan
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Credence
        run: |
          python -m pip install --upgrade pip
          # `supply-chain` needs the `advanced` extra (local-filesystem scanner deps).
          # This repo's self-scan installs from the checkout; downstream users:
          #   pip install "credence-scan[advanced]"
          pip install ".[advanced]"

      - name: Run supply-chain scan
        run: |
          credence supply-chain . \
            --offline \
            --output json \
            --out-file credence-results.json
        continue-on-error: true  # findings (exit 1) shouldn't fail the sample job

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: credence-results
          path: credence-results.json
