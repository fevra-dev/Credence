# Pre-commit hook definitions for downstream repos. To use:
#
#   # In a downstream repo's .pre-commit-config.yaml:
#   repos:
#     - repo: https://github.com/fevra-dev/Credence
#       rev: v0.6.1
#       hooks:
#         - id: credence-supply-chain
#
# `credence supply-chain` scans a directory TREE (lock files + working-tree files),
# not individual files — so this hook runs once over the repo root, not per staged
# file (the old per-file `credence-staged` hook was removed: supply-chain's PATH is
# directory-only). The `advanced` extra deps are pulled in via additional_dependencies
# so the local-filesystem scanner imports cleanly in pre-commit's isolated environment.

- id: credence-supply-chain
  name: Credence supply-chain scan (full repo)
  description: Scan the working tree for credentials and supply-chain risk
  entry: credence supply-chain .
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit, manual]
  additional_dependencies:
    - "aiofiles>=23.2.0"
    - "GitPython>=3.1.40"
    - "rich>=13.7.0"
    - "python-magic>=0.4.27"
